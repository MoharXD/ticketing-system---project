<article id="action-section" class="d-none pb-5 mt-5 pt-4 border-top">
            <h2 id="selected-event-title" class="fw-bold mb-4 text-center text-dark"></h2>
            
            <div id="date-selection-container" class="mb-5 text-center d-none">
                <h5 class="fw-bold mb-3 text-muted text-uppercase" style="letter-spacing: 1px; font-size: 0.85rem;">Select Attendance Date</h5>
                <div id="date-pills" class="d-flex justify-content-center gap-2 flex-wrap mb-4"></div>
            </div>

            <div id="seated-view" class="d-none mx-auto" style="max-width: 850px;">
                <div class="bms-screen-container">
                    <div class="bms-screen"></div>
                    <div class="bms-screen-text">STAGE / SCREEN</div>
                </div>

                <div id="seat-map" class="w-100 mb-3"></div>
                
                <div class="seat-legend">
                    <div class="legend-item"><div class="legend-box legend-available"></div> Available</div>
                    <div class="legend-item"><div class="legend-box legend-selected"></div> Selected</div>
                    <div class="legend-item"><div class="legend-box legend-sold"></div> Sold</div>
                </div>
                
                <div class="booking-action-bar mt-4 d-flex justify-content-between align-items-center shadow-sm">
                    <h3 class="mb-0 fw-bold text-dark">Total: <span class="text-success">₹<span id="seated-total">0</span></span></h3>
                    <button id="book-seats-btn" class="btn btn-success fw-bold fs-5 px-5 py-2 rounded-pill shadow" disabled>Confirm Seats</button>
                </div>
            </div>

            <div id="general-view" class="d-none mx-auto" style="max-width: 450px;">
                <div class="card p-5 border-0 bg-white shadow-lg">
                    <h4 class="fw-bold mb-3 text-dark">General Admission</h4>
                    <div class="d-flex justify-content-between mb-4 pb-3 border-bottom">
                        <span class="text-muted fw-bold">Available:</span>
                        <span id="tickets-left" class="fw-bold text-dark fs-5">0</span>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label">Select Quantity</label>
                        <input type="number" id="general-qty" class="form-control form-control-lg text-center fw-bold" min="1" value="1">
                    </div>
                    
                    <h3 class="fw-bold mb-4 text-center">Total: <span class="text-success">₹<span id="general-total">0</span></span></h3>
                    <button id="book-general-btn" class="btn btn-success btn-lg w-100 fw-bold rounded-pill">Secure Tickets Now</button>
                </div>
            </div>
        </article>
